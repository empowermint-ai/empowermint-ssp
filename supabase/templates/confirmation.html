<!DOCTYPE html>
<html>
  <body style="margin:0; padding:0; background:#F1EFE7;">
    <table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="background:#F1EFE7; padding:32px 16px;">
      <tr>
        <td align="center">
          <table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="max-width:480px; background:#FFFFFF; border-radius:14px; overflow:hidden;">
            <tr>
              <td style="padding:36px 28px 8px 28px; text-align:center;">
                <img src="https://empowermint-ssp.vercel.app/brand/logo-em-power-black.png" alt="empowermint" width="72" style="display:block; margin:0 auto 24px auto;" />
                <p style="margin:0; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size:11px; font-weight:700; letter-spacing:0.6px; text-transform:uppercase; color:#0A7968;">
                  Confirm your email
                </p>
                <h1 style="margin:8px 0 0 0; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size:21px; font-weight:800; color:#000000;">
                  You&#39;re almost in, {{ .Data.username }}!
                </h1>
              </td>
            </tr>

            <tr>
              <td style="padding:16px 28px 0 28px; text-align:center;">
                <p style="margin:0; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size:14px; color:#4a473f; line-height:1.5;">
                  One tap and your study plan is ready to go.
                </p>
              </td>
            </tr>

            <tr>
              <td style="padding:28px 28px 8px 28px; text-align:center;">
                <a
                  href="{{ .ConfirmationURL }}"
                  style="display:inline-block; background:#F37021; color:#FFFFFF; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size:14px; font-weight:700; text-decoration:none; padding:15px 36px; border-radius:10px;"
                >
                  Confirm my email
                </a>
              </td>
            </tr>

            <tr>
              <td style="padding:12px 28px 32px 28px; text-align:center;">
                <p style="margin:0; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size:11px; color:#8A8579;">
                  If the button doesn&#39;t work, copy and paste this link:<br />
                  <a href="{{ .ConfirmationURL }}" style="color:#0A7968; word-break:break-all;">{{ .ConfirmationURL }}</a>
                </p>
              </td>
            </tr>

            <tr>
              <td style="padding:0 28px 28px 28px; text-align:center; border-top:1px solid #E2DDD0;">
                <p style="margin:16px 0 0 0; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size:11px; color:#8A8579;">
                  If you didn&#39;t sign up for empowermint, you can safely ignore this email.
                </p>
                <img src="https://empowermint-ssp.vercel.app/brand/logo-empowermint-black.png" alt="empowermint" width="80" style="display:block; margin:18px auto 0 auto; opacity:0.85;" />
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
