<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <title>empowermint SSP</title>
    <style>
      html, body {
        height: 100%;
        margin: 0;
        overflow-x: hidden;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        background: #F1EFE7;
        font-family: -apple-system, 'Inter', sans-serif;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #1A1917;
        }
      }
      .wrap {
        text-align: center;
        padding: 24px;
      }
      .mark {
        width: 88px;
        height: 88px;
        border-radius: 20px;
        background: #F37021;
        color: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
        font-weight: 700;
        margin: 0 auto 20px;
        font-family: Georgia, 'Times New Roman', serif;
        letter-spacing: -0.02em;
      }
      h1 {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: -0.066em;
        color: #163460;
        margin: 0 0 8px;
      }
      @media (prefers-color-scheme: dark) {
        h1 {
          color: #F1EFE7;
        }
      }
      p {
        font-size: 14px;
        color: #8A8579;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="mark">em</div>
      <h1>empowermint SSP</h1>
      <p>You're offline. Reconnect to keep planning.</p>
    </div>
  </body>
</html>
